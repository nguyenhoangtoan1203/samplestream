name: Backend CI - Java

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build:
    name: Build & Test (Java 17 / Maven)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── JDK setup ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs

      # ── Build & test ────────────────────────────────────────────────────────
      - name: Build with Maven (compile + test + package)
        env:
          # Provide a dummy MongoDB URI so Spring context can start during tests.
          # Replace with a real GitHub Secret if your tests need a live DB.
          SPRING_DATA_MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/testdb' }}
          SPRING_DATA_MONGODB_DATABASE: testdb
        run: ./mvnw --no-transfer-progress clean package

      # ── Upload JAR as artifact ───────────────────────────────────────────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: streaming-api-jar
          path: backend/target/*.jar
          retention-days: 7

