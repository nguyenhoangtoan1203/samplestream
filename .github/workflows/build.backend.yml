name: Backend CI - Java

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build:
    name: Build & Test (Java 17 / Maven)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── JDK setup ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs

      # ── Build & test ────────────────────────────────────────────────────────
      # MongoDB is mocked at the test level — no real DB needed in CI.
      - name: Build with Maven (compile + test + package)
        run: ./mvnw --no-transfer-progress clean package

